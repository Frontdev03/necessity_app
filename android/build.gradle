buildscript {
    ext {
        buildToolsVersion = "36.0.0" // UPDATED
        minSdkVersion = 26 // UPDATED
        compileSdkVersion = 36 // UPDATED
        targetSdkVersion = 36 // UPDATED
        ndkVersion = "27.2.12479018" // UPDATED
        kotlinVersion = "1.9.25"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.7.2") // UPDATED
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
    }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "com.facebook.react.rootproject"
